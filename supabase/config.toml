# Configuración de Edge Functions.
#
# Solo se listan aquí las funciones PÚBLICAS (verify_jwt = false): las que
# llama un sistema externo o un usuario sin sesión, donde el gateway de
# Supabase NO debe exigir un JWT. La seguridad real la hace cada función
# internamente (verifica firma, dueño, cooperador válido, etc.).
#
# El resto de las funciones NO se listan y usan el default verify_jwt = true
# (requieren un JWT válido de usuario autenticado):
#   crear-pago-mp, confirmar-pago-mp, gestionar-solicitud, cancelar-evento,
#   eliminar-cuenta, guardar-resena, reportar-evento, resolver-reporte,
#   generar-link-cooperador, hacer-checkin.
#
# Nota: hacer-checkin también lo llaman cooperadores sin cuenta (mandan la
# publishable key, que pasa el gateway), por eso puede quedarse en true.

# mp-webhook: lo llama Mercado Pago servidor-a-servidor, sin auth de Supabase.
[functions.mp-webhook]
verify_jwt = false

# mp-oauth: Mercado Pago redirige el navegador aquí con ?code&state, sin JWT.
[functions.mp-oauth]
verify_jwt = false

# unirse-cooperador: lo usa una persona sin cuenta desde el link de invitación.
[functions.unirse-cooperador]
verify_jwt = false

# buscar-checkin-cooperador: búsqueda de check-in de un cooperador sin cuenta.
[functions.buscar-checkin-cooperador]
verify_jwt = false

# guardar-avatar-registro: se llama justo tras signUp, antes de confirmar
# el correo — todavía no existe ninguna sesión/JWT.
[functions.guardar-avatar-registro]
verify_jwt = false

# avisar-fallo-reembolso: la dispara un Database Webhook (INSERT en
# fallos_reembolso), no un usuario. Se protege con un secreto compartido
# (x-alerta-secret) que verifica la propia función, no con JWT.
[functions.avisar-fallo-reembolso]
verify_jwt = false
